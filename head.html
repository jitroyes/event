<html lang=fr>

<head>
	<meta charset="utf-8">

		body {

		body.blbl {
			max-width: 70ex;
			height: 100vh;
			margin: auto;
			padding: 1ex;

			flex-direction: column;

			align-items: flex-start; */
			/* justify-items: flex-start; */

		body.lines {

			display: grid;
