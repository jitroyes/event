<!DOCTYPE html>
<html lang=fr>

<head>
	<meta charset="utf-8">
	<meta name=viewport content="width=device-width,initial-scale=1.0">
	<title>Évènements</title>
	<style>
		body {
			font-size: large;
			font-family: monospace;
			margin: 0;
		}

		header {
			background: black;
			color: white;
			padding: 2ex;

			h1 {
				margin: 0;
			}
		}

		h2 {
			display: table;
			padding: 1ex 5ex;
			font-size: 200%;
			background: black;
			color: white;
		}

		.blocks {
			display: flex;
			flex-wrap: wrap;
			gap: 2ex;
			padding: 2ex;

			&>div.bl {
				margin: 0;
				width: 70ex;
				padding: 2ex;

				&.event {
					background: #3885f4;
				}

				&.petition {
					background: #f9c900;
				}

				h3 {
					font-size: 150%;
				}

				.lb {
					display: table;
					padding: 1ex 2ex;
					font-weight: bold;
					border: solid 3px;
					border-radius: 1ex;

					hr {
						border: solid 1.5px black;
					}
				}
			}
		}

		.link {
			background: #2e9959;
			padding: 1ex 2ex;
			border: solid 3px #2e9959;
			font-weight: bold;
		}

		p {
			text-align: justify;
			text-indent: 3ex;
		}

		a {
			color: inherit;

			&:hover {
				background: white;
				color: black;
			}
		}
	</style>
</head>
